<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>站点详情 - 城市共享设备智能调度平台</title>
  <link rel="stylesheet" href="assets/app.css"/>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <div id="stationName">站点</div>
        <div class="muted" style="font-size:12px;" id="stationAddr">—</div>
      </div>
    </div>
    <div class="nav">
      <a class="pill" href="index.html">概览</a>
      <a class="pill" href="stations.html">站点</a>
      <a class="pill" href="me.html">我的</a>
      <a class="pill" href="login.html" id="loginBtn">登录</a>
    </div>
  </div>

  <div class="grid">
    <div class="card span6">
      <h2>当前租借</h2>
      <div id="activeBox" class="muted">未登录或无租借</div>
      <div class="row" style="margin-top:10px;">
        <button class="btn" id="refreshBtn">刷新</button>
      </div>
      <div class="muted" style="font-size:12px;margin-top:8px;">
        约束：一人一租（用户存在 active 时不可再次租借），Lua 脚本原子校验。
      </div>
    </div>

    <div class="card span6">
      <h2>设备列表</h2>
      <div class="list" id="deviceList"></div>
      <div class="muted" style="font-size:12px;margin-top:8px;">
        库存读取：`rental:stock:{stationId}:{deviceId}`；不存在时会从 `tb_device.stock` 初始化。
      </div>
    </div>
  </div>

  <div class="footer">高并发路径：`/rental/rent/{stationId}/{deviceId}`（Redis+Lua）→ MQ 异步落库。</div>
</div>
<div class="toast" id="toast"></div>
<script src="assets/app.js"></script>
<script>
  const { Storage, api, toast, qs, requireLogin } = window.RentalApp;
  const stationId = qs('id');
  if (!stationId) {
    location.href = 'stations.html';
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function renderActive(actives) {
    const box = document.getElementById('activeBox');
    if (!Storage.getToken()) {
      box.innerHTML = `<div class="muted">未登录，无法查询租借状态</div>
                       <div style="margin-top:10px;"><a class="btn primary" href="login.html?next=${encodeURIComponent(location.pathname + location.search)}">去登录</a></div>`;
      return;
    }
    const list = Array.isArray(actives) ? actives.filter(x => x && x.orderId) : [];
    if (list.length === 0) {
      box.innerHTML = `<div class="muted">当前没有租借中的订单</div>`;
      return;
    }
    box.innerHTML = list.map(a => `
      <div class="item" style="margin-top:10px;">
        <div>
          <div class="title">订单号 ${escapeHtml(a.orderId)}</div>
          <div class="sub">设备：${escapeHtml(a.deviceName || a.deviceId || '—')}</div>
        </div>
        <div class="row" style="gap:8px;">
          <span class="badge ok">租借中</span>
          <button class="btn primary js-return" data-order-id="${escapeHtml(a.orderId)}">归还</button>
        </div>
      </div>
    `).join('');
    box.querySelectorAll('.js-return').forEach(btn => {
      btn.addEventListener('click', () => returnDevice(btn.dataset.orderId));
    });
  }

  function renderDevices(devices, actives) {
    const list = document.getElementById('deviceList');
    list.innerHTML = '';
    const activeList = Array.isArray(actives) ? actives : [];
    (devices || []).forEach(d => {
      const stock = (d.stock === undefined || d.stock === null) ? 0 : d.stock;
      const deviceName = d && d.name ? String(d.name) : '';
      const hasSameTypeActive = activeList.some(a => a && a.orderId && (
        (a.deviceName && deviceName && String(a.deviceName) === deviceName) ||
        (a.deviceId && d && d.id && String(a.deviceId) === String(d.id))
      ));
      const disable = hasSameTypeActive || stock < 1;
      const badgeClass = stock > 10 ? 'ok' : (stock > 0 ? 'warn' : 'bad');
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div style="min-width:0;">
          <div class="title">${escapeHtml(d.name || ('设备#' + d.id))}</div>
          <div class="sub">${escapeHtml(d.model || '')}</div>
          <div class="sub">库存：${stock}</div>
        </div>
        <div class="row" style="gap:8px;flex-shrink:0;">
          <span class="badge ${badgeClass}">${stock < 1 ? '无货' : '可租'}</span>
          <button class="btn ${disable ? '' : 'primary'}" ${disable ? 'disabled style="opacity:.5;cursor:not-allowed;"' : ''}>租借</button>
        </div>
      `;
      const btn = div.querySelector('button');
      btn.addEventListener('click', () => rentDevice(d.id, stock, hasSameTypeActive));
      list.appendChild(div);
    });
    if (!devices || devices.length === 0) {
      const div = document.createElement('div');
      div.className = 'muted';
      div.style.marginTop = '10px';
      div.textContent = '该站点暂无设备（请在 tb_device 插入 station_id=该站点ID 的数据）';
      list.appendChild(div);
    }
  }

  async function rentDevice(deviceId, stock, hasSameTypeActive) {
    if (hasSameTypeActive) return toast('你有同类未归还租借，请先归还');
    if (stock < 1) return toast('库存不足');
    if (!requireLogin()) return;
    try {
      const orderId = await api(`/rental/rent/${stationId}/${deviceId}`, { method: 'POST' });
      toast('租借成功，订单号：' + orderId);
      await refresh();
    } catch (e) {
      toast(e.message || String(e));
    }
  }

  async function returnDevice(orderId) {
    if (!requireLogin()) return;
    try {
      await api(`/rental/return/${orderId}`, { method: 'POST' });
      toast('归还请求已提交');
      await refresh();
    } catch (e) {
      toast(e.message || String(e));
    }
  }

  async function refresh() {
    document.getElementById('loginBtn').style.display = Storage.getToken() ? 'none' : 'inline-block';
    try {
      const station = await api('/shop/' + stationId, { auth: false });
      document.getElementById('stationName').textContent = station.name || ('站点#' + stationId);
      document.getElementById('stationAddr').textContent = station.address || '';
    } catch (e) {
      document.getElementById('stationName').textContent = '站点#' + stationId;
      document.getElementById('stationAddr').textContent = '';
    }

    let actives = [];
    if (Storage.getToken()) {
      try {
        actives = await api('/rental/actives');
      } catch (e) {
        actives = [];
      }
    }
    renderActive(actives);

    try {
      const devices = await api(`/station/${stationId}/devices`, { auth: false });
      (actives || []).forEach(a => {
        if (a && a.deviceId && !a.deviceName) {
          const d = (devices || []).find(x => x.id === a.deviceId);
          if (d) a.deviceName = d.name;
        }
      });
      renderDevices(devices, actives);
    } catch (e) {
      toast(e.message || String(e));
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', refresh);
  refresh();
</script>
</body>
</html>
