<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>城市共享设备智能调度平台</title>
  <link rel="stylesheet" href="assets/app.css"/>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <div>城市共享设备智能调度平台</div>
        <div class="muted" style="font-size:12px;">Redis+Lua 原子租借 · MQ 异步落库 · 分布式锁</div>
      </div>
    </div>
    <div class="nav">
      <a class="pill primary" href="stations.html">站点</a>
      <a class="pill" href="me.html">我的</a>
      <a class="pill" href="login.html" id="loginBtn">登录</a>
    </div>
  </div>

  <div class="grid">
    <div class="card span6">
      <h2>运行状态</h2>
      <div class="kpi">
        <div class="box">
          <div class="muted">当前登录</div>
          <div class="value" id="kpiUser">未登录</div>
        </div>
        <div class="box">
          <div class="muted">当前租借</div>
          <div class="value" id="kpiRental">—</div>
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button class="btn primary" id="goStations">查看站点与设备</button>
        <button class="btn" id="goActive">打开当前租借</button>
      </div>
      <div class="muted" style="margin-top:10px;font-size:12px;">
        说明：站点详情页支持高并发租借/归还（后端 Redis+Lua 保障不超卖、不重复租借）。
      </div>
    </div>

    <div class="card span6">
      <h2>快速查找站点</h2>
      <div class="row">
        <input id="kw" placeholder="输入站点名称关键字" style="flex:1;min-width:220px"/>
        <button class="btn" id="searchBtn">搜索</button>
      </div>
      <div class="list" id="stationList"></div>
      <div class="muted" style="font-size:12px;margin-top:8px;">数据来源：后端 `/shop/of/name`（兼容原数据模型）。</div>
    </div>
  </div>

  <div class="footer">EchoSpot · Rental Frontend</div>
</div>
<div class="toast" id="toast"></div>
<script src="assets/app.js"></script>
<script>
  const { Storage, api, toast } = window.RentalApp;

  function setText(id, text){ document.getElementById(id).textContent = text; }

  async function init() {
    const token = Storage.getToken();
    document.getElementById('loginBtn').style.display = token ? 'none' : 'inline-block';

    if (token) {
      try {
        const me = await api('/user/me');
        setText('kpiUser', (me && me.nickName) ? me.nickName : ('用户#' + me.id));
      } catch (e) {
        Storage.clearToken();
        setText('kpiUser', '未登录');
      }
    }

    if (Storage.getToken()) {
      try {
        const actives = await api('/rental/actives');
        const list = Array.isArray(actives) ? actives.filter(x => x && x.orderId) : [];
        if (list.length === 0) setText('kpiRental', '无');
        else setText('kpiRental', list.length + ' 单');
      } catch (e) {
        setText('kpiRental', '—');
      }
    } else {
      setText('kpiRental', '请登录');
    }
  }

  async function searchStations() {
    const kw = document.getElementById('kw').value || '';
    const list = document.getElementById('stationList');
    list.innerHTML = '';
    try {
      const stations = await api('/shop/of/name', { query: { name: kw, current: 1 }, auth: false });
      (stations || []).slice(0, 8).forEach(s => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div>
            <div class="title">${escapeHtml(s.name || ('站点#' + s.id))}</div>
            <div class="sub">${escapeHtml(s.address || '')}</div>
          </div>
          <div class="row" style="gap:8px;">
            <span class="badge">ID ${s.id}</span>
            <a class="btn primary" href="station.html?id=${s.id}">进入</a>
          </div>
        `;
        list.appendChild(div);
      });
      if (!stations || stations.length === 0) {
        const div = document.createElement('div');
        div.className = 'muted';
        div.style.marginTop = '10px';
        div.textContent = '暂无站点，请先导入数据库数据';
        list.appendChild(div);
      }
    } catch (e) {
      toast(e.message || String(e));
    }
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  document.getElementById('goStations').addEventListener('click', () => location.href = 'stations.html');
  document.getElementById('goActive').addEventListener('click', async () => {
    const token = Storage.getToken();
    if (!token) return location.href = 'login.html';
    try {
      const actives = await api('/rental/actives');
      const list = Array.isArray(actives) ? actives.filter(x => x && x.orderId) : [];
      const first = list[0];
      if (first && first.stationId) location.href = 'station.html?id=' + first.stationId;
      else toast('当前没有租借中的订单');
    } catch (e) {
      toast(e.message || String(e));
    }
  });
  document.getElementById('searchBtn').addEventListener('click', searchStations);
  document.getElementById('kw').addEventListener('keydown', (e) => { if (e.key === 'Enter') searchStations(); });

  init().then(searchStations);
</script>
</body>
</html>
