<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>城市共享设备智能调度平台</title>
  <!-- 引入样式 -->
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/index.css" rel="stylesheet">
  <link href="./css/main.css" rel="stylesheet">
  <!-- 添加字体图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style type="text/css">
      .el-input__inner {
          border-radius: 25px;
          padding-left: 35px;
      }
      .el-input__prefix {
          left: 12px;
      }
      .el-icon-search {
          color: #999;
      }
      /* 加载动画 */
      .loading {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100px;
          font-size: 14px;
          color: #A68B5B;
      }
      .loading::after {
          content: '';
          width: 20px;
          height: 20px;
          border: 2px solid #A68B5B;
          border-top: 2px solid transparent;
          border-radius: 50%;
          margin-left: 10px;
          animation: spin 1s linear infinite;
      }
      @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
      }
      /* 空状态 */
      .empty-state {
          text-align: center;
          padding: 60px 0;
          color: #999;
      }
      .empty-state i {
          font-size: 48px;
          margin-bottom: 16px;
          color: #e0e0e0;
      }
  </style>
</head>
<body>
<div id="app">
  <div class="search-bar">
    <div class="city-btn">城市 <i class="el-icon-arrow-down"></i></div>
    <div class="search-input">
      <el-input size="mini" placeholder="搜索站点 / 设备 / 地址">
        <i slot="prefix" class="el-input__icon el-icon-search"></i>
      </el-input>
    </div>
    <div class="header-icon" @click="toPage(4)"><i class="el-icon-user"></i></div>
  </div>
  <div style="padding: 10px 10px 0 10px;">
    <div style="background: linear-gradient(135deg,#0ea5e9,#22c55e); border-radius: 14px; padding: 14px; color: #fff;">
      <div style="font-size: 16px; font-weight: 700;">城市共享设备智能调度平台</div>
      <div style="margin-top: 6px; font-size: 12px; opacity: .92;">高并发租借 / 归还 · Redis+Lua 原子校验 · MQ 异步落库</div>
      <div style="margin-top: 10px; display:flex; gap:8px;">
        <div @click="toStationList()" style="flex:1; background: rgba(255,255,255,.18); border-radius: 10px; padding: 10px; text-align:center; cursor:pointer;">
          <div style="font-size: 13px; font-weight: 600;">站点列表</div>
          <div style="font-size: 11px; opacity:.9;">查看设备库存</div>
        </div>
        <div @click="toMyRental()" style="flex:1; background: rgba(255,255,255,.18); border-radius: 10px; padding: 10px; text-align:center; cursor:pointer;">
          <div style="font-size: 13px; font-weight: 600;">我的租借</div>
          <div style="font-size: 11px; opacity:.9;">一人一租</div>
        </div>
      </div>
    </div>
  </div>
  <div class="type-list">
    <div class="type-box" v-for="t in types" :key="t.id" @click="toShopList(t.id, t.name)">
      <div class="type-view"><img :src="'/imgs/' + t.icon" alt=""></div>
      <div class="type-text">{{t.name}}</div>
    </div>
  </div>
  <div class="blog-list" @scroll="onScroll">
    <div v-if="blogs.length === 0" class="empty-state">
      <i class="fas fa-compass"></i>
      <div>正在加载平台动态...</div>
    </div>
    <div v-else class="blog-box fade-in" v-for="(b, index) in blogs" :key="b.id" @click="toBlogDetail(b)" :style="{animationDelay: index * 0.1 + 's'}">
      <div class="blog-img"><img :src="b.img" alt=""></div>
      <div class="blog-title">{{b.title}}</div>
      <div class="blog-foot">
        <div class="blog-user">
          <div class="blog-user-icon"><img :src="b.icon || '/imgs/icons/default-icon.png'" alt=""></div>
          <div class="blog-user-name">{{b.name}}</div>
        </div>
        <div class="blog-liked" @click.stop="addLike(b)">
          <svg t="1646634642977" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2187" width="16" height="16">
            <path d="M160 944c0 8.8-7.2 16-16 16h-32c-26.5 0-48-21.5-48-48V528c0-26.5 21.5-48 48-48h32c8.8 0 16 7.2 16 16v448zM96 416c-53 0-96 43-96 96v416c0 53 43 96 96 96h96c17.7 0 32-14.3 32-32V448c0-17.7-14.3-32-32-32H96zM505.6 64c16.2 0 26.4 8.7 31 13.9 4.6 5.2 12.1 16.3 10.3 32.4l-23.5 203.4c-4.9 42.2 8.6 84.6 36.8 116.4 28.3 31.7 68.9 49.9 111.4 49.9h271.2c6.6 0 10.8 3.3 13.2 6.1s5 7.5 4 14l-48 303.4c-6.9 43.6-29.1 83.4-62.7 112C815.8 944.2 773 960 728.9 960h-317c-33.1 0-59.9-26.8-59.9-59.9v-455c0-6.1 1.7-12 5-17.1 69.5-109 106.4-234.2 107-364h41.6z m0-64h-44.9C427.2 0 400 27.2 400 60.7c0 127.1-39.1 251.2-112 355.3v484.1c0 68.4 55.5 123.9 123.9 123.9h317c122.7 0 227.2-89.3 246.3-210.5l47.9-303.4c7.8-49.4-30.4-94.1-80.4-94.1H671.6c-50.9 0-90.5-44.4-84.6-95l23.5-203.4C617.7 55 568.7 0 505.6 0z" p-id="2188" :fill="b.isLike ? '#A68B5B' : '#82848a'"></path>
          </svg>
          {{b.liked}}
        </div>
      </div>
    </div>
    <div v-if="isLoading" class="loading">
      加载中
    </div>
  </div>
  <foot-bar :active-btn="1"></foot-bar>
</div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<!-- 引入组件库 -->
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script src="./js/footer.js"></script>
<script>

  const app = new Vue({
    el: "#app",
    data: {
      isReachBottom: false,
      isLoading: false,
      types: [], // 类型列表
      blogs: [], // 播客列表
      current: 1,// blog的页码
    },
    created() {
      // 查询类型
      this.queryTypes();
      this.queryHotBlogsScroll();
    },
    methods: {
      toStationList() {
        location.href = "/shop-list.html?type=1&name=站点";
      },
      toMyRental() {
        if(!token){
          this.$message.error("请先登录")
          setTimeout(() => {
            location.href = "/login.html"
          }, 200);
          return;
        }
        location.href = "/shop-detail.html?id=1";
      },
      toPage(i) {
        if (i === 4) {
          location.href = "/info.html"
        }
      },
      queryTypes() {
        axios.get("/shop-type/list")
          .then(({data}) => {
            this.types = data;
          })
          .catch(err => {
            this.$message.error(err)
          })
      },
      queryHotBlogsScroll() {
        this.isLoading = true;
        axios.get("/blog/hot?current=" + this.current)
          .then(({data}) => {
            data.forEach(b => b.img = b.images.split(",")[0]);
            this.blogs = this.blogs.concat(data);
          })
          .catch(err => {
            this.$message.error('加载失败，请重试');
          })
          .finally(() => {
            this.isLoading = false;
          })
      },
      addLike(b) {
        // 防止重复点击
        if (b.isLiking) return;
        b.isLiking = true;
        
        axios.put("/blog/like/" +b.id)
          .then(({data}) => {
            this.queryBlogById(b)
          })
          .catch(err => {
            this.$message.error('操作失败，请重试');
          })
          .finally(() => {
            b.isLiking = false;
          })
      },
      queryBlogById(b) {
        axios.get("/blog/" + b.id)
          .then(({data}) => {
            b.liked = data.liked;
            b.isLike = data.isLike;
          })
          .catch(() => {
            this.$message.error
            b.liked ++;
          })
      },
      onScroll(e) {
        let scrollTop = e.target.scrollTop;
        let offsetHeight = e.target.offsetHeight;
        let scrollHeight = e.target.scrollHeight;
        if (scrollTop + offsetHeight > scrollHeight && !this.isReachBottom) {
          this.isReachBottom = true

          // 再次查询下一页数据
          this.current++;
          this.queryHotBlogsScroll();
        } else {
          this.isReachBottom = false
        }
      },
      toShopList(id, name) {
        location.href = "/shop-list.html?type=" + id + "&name=" + name
      },
      toBlogDetail(b) {
        location.href = "/blog-detail.html?id=" + b.id
      }
    }
  })
</script>
</body>
</html>
